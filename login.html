<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  >

  <title>
    Login • FCOOPERATION
  </title>

  <link
    rel="stylesheet"
    href="login.css"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

</head>

<body>

<div class="container">

  <img
    src="/favicon.png"
    class="logo"
  >

  <h1>
    Welcome back 👋
  </h1>

  <p class="subtitle">
    Login to continue to FCOOPERATION
  </p>

  <div
    id="message"
    class="message"
  ></div>

  <button
  id="verifyBtn"
  style="display:none;"
>
  Verify Email
  </button>

  <form id="loginForm">

    <input
      id="email"
      type="email"
      placeholder="Email address"
      required
    >

    <div class="password-box">

      <input
        id="password"
        type="password"
        placeholder="Password"
        required
      >

      <i
        class="
          fa-solid
          fa-eye
          toggle-eye
        "
        data-target="password"
      ></i>

    </div>

    <button
      id="loginBtn"
      type="submit"
    >
      Login
    </button>

  </form>

  <div class="divider">
    OR
  </div>

  <button
    id="googleBtn"
    class="google-btn"
  >
    Continue with Google
  </button>

  <a
    href="/forgot-password"
    class="forgot"
  >
    Forgot Password?
  </a>

  <p class="bottom-text">

    Don't have an account?

    <a href="/signup">
      Sign Up
    </a>

  </p>

</div>

<script
  type="module"
  src="login.js"
></script>

</body>
</html>
