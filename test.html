<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Google Login Test</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f5f5f5;
    }

    .card{
      width:350px;
      background:white;
      padding:40px;
      border-radius:24px;
      box-shadow:0 15px 40px rgba(0,0,0,.1);
      text-align:center;
    }

    .logo{
      width:70px;
      height:70px;
      background:#111;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      font-weight:700;
      border-radius:20px;
      margin:auto;
      margin-bottom:20px;
    }

    h1{
      margin-bottom:15px;
    }

    p{
      color:#666;
      margin-bottom:30px;
      line-height:1.6;
    }

    button{
      width:100%;
      height:55px;
      border:none;
      border-radius:14px;
      background:#111;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      opacity:.9;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">F</div>

  <h1>Google Login Test</h1>

  <p>
    Testing Google authentication with Supabase.
  </p>

  <button id="googleBtn">
    Continue with Google
  </button>

</div>

<script type="module">

import {
  createClient
} from "https://esm.sh/@supabase/supabase-js";

const supabase = createClient(
  "https://pwsxezhugsxosbwhkdvf.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJz..."
);

document
  .getElementById("googleBtn")
  .onclick = async () => {

    const {
      data,
      error
    } = await supabase.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo:
          "https://pwsxezhugsxosbwhkdvf.supabase.co/auth/v1/callback"
      }
    });

    if(error){
      alert(error.message);
    }
};

</script>

</body>
</html>
