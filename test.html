<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FVIDS Storage Test</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:monospace;
  padding:20px;
}

button{
  padding:10px 16px;
  margin-bottom:15px;
}

pre{
  background:#222;
  padding:15px;
  border-radius:10px;
  white-space:pre-wrap;
  word-break:break-word;
}
</style>
</head>
<body>

<h2>FVIDS Upload Storage Test</h2>

<button onclick="checkStorage()">
Check Storage
</button>

<pre id="output">Click button...</pre>

<script>
function checkStorage() {

  const raw =
    localStorage.getItem("fvids_upload_queue");

  const output =
    document.getElementById("output");

  if (!raw) {
    output.textContent =
      "No fvids_upload_queue found.";
    return;
  }

  try {

    const parsed = JSON.parse(raw);

    output.textContent =
      JSON.stringify(
        parsed,
        null,
        2
      );

  } catch(err) {

    output.textContent =
      "Invalid JSON:\n\n" + raw;
  }
}
</script>

</body>
</html>
