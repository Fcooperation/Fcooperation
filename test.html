<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FVIDS API Test</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    button {
      padding: 10px 15px;
      margin: 10px 0;
      cursor: pointer;
    }

    #feed {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #222;
      padding: 10px;
      border-radius: 10px;
    }

    video {
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
      display: block;
      margin-top: 10px;
    }

    .url {
      font-size: 12px;
      word-break: break-all;
      color: #aaa;
    }

    .small {
      font-size: 13px;
      color: #ccc;
    }

    a.download {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #0a84ff;
      color: white;
      border-radius: 6px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<h2>🎬 FVIDS API TEST</h2>

<button onclick="loadVideos()">Load Videos</button>
<button onclick="loadMore()">Load More</button>

<div id="feed"></div>

<script>

let page = 1;
let videos = [];

const feed = document.getElementById("feed");

// ---------------- LOAD VIDEOS ----------------
async function loadVideos(reset = true) {

  if (reset) {
    page = 1;
    feed.innerHTML = "Loading videos...";
  }

  try {

    const res = await fetch(
      `https://fweb-backend.onrender.com/fvids?page=${page}`
    );

    const data = await res.json();

    console.log("SERVER RESPONSE:", data);

    if (!data || data.length === 0) {
      feed.innerHTML = "<p>No videos found</p>";
      return;
    }

    renderVideos(data, reset);

  } catch (err) {
    console.error(err);
    feed.innerHTML = "<p>Error loading videos</p>";
  }
}

// ---------------- LOAD MORE ----------------
function loadMore() {
  page += 1;
  loadVideos(false);
}

// ---------------- GET FILE SIZE ----------------
async function getFileSize(url) {
  try {
    const res = await fetch(url, { method: "HEAD" });
    const size = res.headers.get("content-length");

    if (!size) return "Unknown";

    const mb = (size / 1024 / 1024).toFixed(2);
    return mb + " MB";

  } catch (e) {
    return "Unknown";
  }
}

// ---------------- RENDER ----------------
function renderVideos(newVideos, reset) {

  if (reset) {
    feed.innerHTML = "";
    videos = [];
  }

  videos.push(...newVideos);

  newVideos.forEach(async (vid) => {

    const size = await getFileSize(vid.video_url);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <p class="url">URL: ${vid.video_url}</p>

      <p class="small">Size: ${size}</p>

      <video controls playsinline muted>
        <source src="${vid.video_url}" type="video/mp4">
      </video>

      <p class="small">Public ID: ${vid.public_id}</p>
      <p class="small">Category: ${vid.category || "none"}</p>

      <a class="download" href="${vid.video_url}" download>
        ⬇ Download Video
      </a>
    `;

    feed.appendChild(div);
  });
}

</script>

</body>
</html>
