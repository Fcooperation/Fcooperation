<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FVIDS Followers Test</title>
</head>
<body>

<h2>Followers</h2>
<button onclick="loadFollowers()">
Load Followers
</button>

<pre id="followers-output">
Waiting...
</pre>

<hr>

<h2>Following</h2>
<button onclick="loadFollowing()">
Load Following
</button>

<pre id="following-output">
Waiting...
</pre>

<script>

const userId =
  "684807070436154";

// ---------------- FOLLOWERS ----------------

async function loadFollowers() {

  try {

    const res = await fetch(
      `https://fweb-backend.onrender.com/fvids/followers?id=${userId}&page=1&limit=20`
    );

    const data = await res.json();

    console.log(
      "Followers:",
      data
    );

    document.getElementById(
      "followers-output"
    ).textContent =
      JSON.stringify(
        data,
        null,
        2
      );

  } catch (err) {

    console.error(err);

    document.getElementById(
      "followers-output"
    ).textContent =
      err.message;

  }

}

// ---------------- FOLLOWING ----------------

async function loadFollowing() {

  try {

    const res = await fetch(
      `https://fweb-backend.onrender.com/fvids/following?id=${userId}&page=1&limit=20`
    );

    const data = await res.json();

    console.log(
      "Following:",
      data
    );

    document.getElementById(
      "following-output"
    ).textContent =
      JSON.stringify(
        data,
        null,
        2
      );

  } catch (err) {

    console.error(err);

    document.getElementById(
      "following-output"
    ).textContent =
      err.message;

  }

}

// Auto-load both on page open
loadFollowers();
loadFollowing();

</script>

</body>
</html>
