<!DOCTYPE html>
<html>

<head>

  <meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

  <title>Dashboard</title>

  <link
    rel="stylesheet"
    href="dashboard.css"
  >

</head>

<body>

  <!-- HEADER -->

  <div class="dashboard-container">

    <h2
      id="greeting"
      class="greeting"
    >
      Good afternoon 👋
    </h2>

    <!-- PROFILE -->

    <div class="profile-section">

      <img
        id="profilePic"
        class="profile-pic"
        src="default.png"
      >

      <input
  type="file"
  id="profileInput"
  accept="image/*"
  hidden
>

<button id="profileBtn">
  Upload Photo
</button>

      <h2
        id="username"
      >
        Loading...
      </h2>

      <p
        id="createdAt"
        class="created-at"
      >
      </p>

      <span
        id="status"
        class="status"
      >
      </span>

    </div>

    <!-- VERIFY BAR -->

    <div
      id="verifyBar"
      class="verify-bar"
    >

      <span>
        Account not verified
      </span>

      <button
        id="resendBtn"
      >
        Resend Verification Email
      </button>

    </div>

    <!-- SERVICES -->

    <h3
      class="service-title"
    >
      Your Services
    </h3>

    <div class="services">

      <a
        href="/study"
        class="service-card"
      >
        📚
        <span>Study</span>
      </a>

      <a
        href="/fvids"
        class="service-card"
      >
        🎬
        <span>Fvids</span>
      </a>

      <a
        href="/fweb"
        class="service-card"
      >
        🔍
        <span>Fweb</span>
      </a>

      <a
        href="/fchat"
        class="service-card"
      >
        💬
        <span>Fchat</span>
      </a>

    </div>

  </div>

  <script
    type="module"
    src="dashboard.js"
  ></script>

</body>

</html>
