<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Chat</title>

<link
rel="stylesheet"
href="chat.css">

</head>

<body>

<header id="top-bar">

<button id="back-btn">
←
</button>

<div id="user-box">

<div id="profile-pic">
F
</div>

<div id="user-info">

<div id="username">
Francis
</div>

<div id="status">
Active now
</div>

</div>

</div>

</header>


<main id="chat-body">

<!-- messages go here -->

</main>


<div id="reply-preview" hidden>

  <div id="reply-content">

    <div id="reply-name"></div>

    <div id="reply-text"></div>

  </div>

  <button id="reply-close">
    ✕
  </button>

</div>

<footer id="bottom-bar">

<textarea
id="message-input"
placeholder="Type a message..."
rows="1"></textarea>

<button id="send-btn">
➤
</button>

</footer>

<script src="chat.script.js"></script>
</body>
</html>
