<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  >

  <title>
    Verify Email
  </title>

  <link
    rel="stylesheet"
    href="resend-verification.css"
  >

</head>

<body>

  <div class="container">

    <div class="card">

      <div class="icon">
        📧
      </div>

      <h1>
        Verify your email
      </h1>

      <p class="subtitle">
        Enter the email address
        associated with your account.
      </p>

      <input
        type="email"
        id="email"
        placeholder="Enter your email"
      >

      <button
        id="resendBtn"
      >
        Resend Verification Email
      </button>

      <div
        id="message"
        class="message"
      ></div>

    </div>

  </div>

  <script
    type="module"
    src="resend-verification.js"
  ></script>

</body>

</html>
