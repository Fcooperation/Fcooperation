<html lang="en">
<head>

  <meta

    content="width=device-width, initial-scale=1.0"
  >

  <title>Add Friends</title>

  <link rel="stylesheet" href="add.css">
  <link rel="icon" href="/favicon.png">

</head>

<body>

  </button>

  <h2>Add Friends</h2>

</div>

  <input
    type="text"
    id="searchInput"

</div>

</div>

<div id="profile-modal"

</div>


<script src="config.js"></script>

</html>
