<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Sign Up • FCOOPERATION</title>

<link rel="stylesheet" href="signup.css">

<script
src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
</script>

</head>

<body>

<div class="signup-container">

<div class="logo-box">
F
</div>

<h1>
FCOOPERATION
</h1>

<p class="subtitle">
Create your ecosystem account
</p>

<form id="signupForm">

<label>Username</label>
<input
type="text"
id="username"
required>

<label>First Name</label>
<input
type="text"
id="firstName"
required>

<label>Last Name</label>
<input
type="text"
id="lastName"
required>

<label>Email Address</label>
<input
type="email"
id="email"
required>

<label>Password</label>

<div class="password-wrapper">
<input
type="password"
id="password"
required>

<button
type="button"
class="eye-btn"
onclick="togglePassword('password',this)">
<svg viewBox="0 0 24 24">
<path d="M12 5C6 5 2 12 2 12s4 7 10 7 10-7 10-7-4-7-10-7z"/>
<circle cx="12" cy="12" r="3"/>
</svg>
</button>
</div>

<label>Confirm Password</label>

<div class="password-wrapper">
<input
type="password"
id="confirmPassword"
required>

<button
type="button"
class="eye-btn"
onclick="togglePassword('confirmPassword',this)">
<svg viewBox="0 0 24 24">
<path d="M12 5C6 5 2 12 2 12s4 7 10 7 10-7 10-7-4-7-10-7z"/>
<circle cx="12" cy="12" r="3"/>
</svg>
</button>
</div>

<button
type="submit"
id="signupBtn"
class="signup-btn">
Sign Up
</button>

</form>

<div class="divider">
<span>OR</span>
</div>

<button
id="googleBtn"
class="google-btn">
Continue with Google
</button>

<p class="login-text">
Already have an account?
<a href="login">
Login
</a>
</p>

<div id="message"></div>

</div>

<script src="signup.js"></script>

</body>
</html>
