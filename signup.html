<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Sign Up • FCOOPERATION</title>

<link rel="stylesheet" href="signup.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">

</head>

<body>

<div class="signup-container">

<div class="logo-box">
F
</div>

<h1>FCOOPERATION</h1>

<p class="subtitle">
Create your F_account
</p>

<form id="signupForm">

<label>Username</label>
<input
type="text"
id="username"
required>

<label>First Name</label>
<input
type="text"
id="firstName"
required>

<label>Last Name</label>
<input
type="text"
id="lastName"
required>

<label>Email Address</label>
<input
type="email"
id="email"
required>

<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
required>

<i
class="fa-regular fa-eye toggle-eye"
data-target="password"></i>

</div>

<label>Confirm Password</label>

<div class="password-box">

<input
type="password"
id="confirmPassword"
required>

<i
class="fa-regular fa-eye toggle-eye"
data-target="confirmPassword"></i>

</div>

<button
type="submit"
id="signupBtn">

Sign Up

</button>

</form>

<div class="divider">

<span>OR</span>

</div>

<button
id="googleBtn"
class="google-btn">

Continue with Google

</button>

<p class="login-text">

Already have an account?

<a href="login">

Login

</a>

</p>

<div id="message"></div>

</div>

<script type="module" src="signup.js"></script>

</body>
</html>
