<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Friend Requests
  </title>

  <link
    rel="icon"
    href="/favicon.png"
  >

  <link
    rel="stylesheet"
    href="friendrequest.css"
  >
</head>

<body>

  <div class="top-bar">

    <button id="back-btn">
      ←
    </button>

    <h2>
      Friend Requests
    </h2>

  </div>

  <div id="log">
    Loading requests...
  </div>

  <div
    id="requests-container"
  ></div>

  <div
    id="empty"
    class="hidden"
  >
    No friend requests yet...
  </div>

  <!-- Profile Modal -->
  <div
    id="profile-modal"
    class="hidden"
  >
    <img
      id="profileView"
    >
  </div>

  <script src="config.js"></script>

  <script
    src="friendrequest.js"
  ></script>

</body>
</html>
