<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Explore</title>

  <link rel="stylesheet" href="explore.css">
</head>
<body>

<div class="explore-page">

  <div class="top-bar">

    <h2>Explore</h2>

    <div id="searchBtn" class="search-btn">

        <svg class="search-icon" viewBox="0 0 24 24">

            <path
                d="M21 21l-4.35-4.35m1.35-5.15a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0z"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            />

        </svg>

    </div>

</div>

  <!-- Trending -->
  <section class="section">

    <div class="section-title">
      🔥 Trending
    </div>

    <div
      class="horizontal-list"
      id="trendingList">
    </div>

  </section>

  <!-- Hashtags -->
  <section class="section">

    <div class="section-title">
      # Popular Hashtags
    </div>

    <div
      class="horizontal-list"
      id="hashtagsList">
    </div>

  </section>

  <!-- Categories -->
  <section class="section">

    <div class="section-title">
      📂 Categories
    </div>

    <div
      class="horizontal-list"
      id="categoriesList">
    </div>

  </section>

  <!-- Suggested Creators -->
  <section class="section">

    <div class="section-title">
      👤 Suggested Creators
    </div>

    <div
      class="horizontal-list creators"
      id="creatorsList">
    </div>

  </section>

</div>

<script src="explore.js"></script>

</body>
</html>
